name: CI

# Type-check + unit tests for @zennopay/react-native. Runs on every PR and on
# pushes to main. The publish-npm workflow stays tag-gated and separate; this
# is the always-on quality gate.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm test
