buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath "com.android.tools.build:gradle:8.1.1"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24"
  }
}

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

android {
  namespace "com.zennopay.reactnative"
  compileSdkVersion safeExtGet("compileSdkVersion", 34)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 24)
    targetSdkVersion safeExtGet("targetSdkVersion", 34)
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
  kotlinOptions {
    jvmTarget = "17"
  }
}

repositories {
  google()
  // The native Zennopay Android SDK (in.zennopay:sdk) is on Maven Central.
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-native:+"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"

  // The native Zennopay Android SDK that renders the PaymentSheet and
  // exposes `Zennopay.presentCheckout(...)`.
  implementation "in.zennopay:sdk:0.2.1"
}
