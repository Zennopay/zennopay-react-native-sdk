buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath "com.android.tools.build:gradle:8.1.1"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24"
  }
}

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

android {
  namespace "com.zennopay.reactnative"
  compileSdkVersion safeExtGet("compileSdkVersion", 34)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 24)
    targetSdkVersion safeExtGet("targetSdkVersion", 34)
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
  kotlinOptions {
    jvmTarget = "17"
  }
}

repositories {
  google()
  // The native Zennopay Android SDK (in.zennopay:sdk) is on Maven Central.
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-native:+"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"

  // The native Zennopay Android SDK that renders the PaymentSheet + receipt and
  // exposes `Zennopay.presentCheckout(...)` / `Zennopay.presentReceipt(...)`.
  implementation "in.zennopay:sdk:0.7.0"

  // The SDK declares these as `implementation` (runtime-scoped in its POM), but
  // the bridge references them at COMPILE time — `ComponentActivity` (the
  // `presentCheckout`/`presentReceipt` receiver) and Compose `Dp`/`.dp` for the
  // `ZennopayAppearance` mapping — so we depend on them directly.
  implementation "androidx.activity:activity:1.9.0"
  implementation platform("androidx.compose:compose-bom:2024.06.00")
  implementation "androidx.compose.ui:ui-unit"
  // `ZennopayAppearance.Typography` references `FontFamily` in its default arg.
  implementation "androidx.compose.ui:ui-text"
}
